<nav class="navbar">
  <div class="navbar-brand" routerLink="/movies" style="cursor: pointer;">
    <span class="brand-name">CinemaBook</span>
  </div>

  <div class="navbar-links">
    <a routerLink="/movies" routerLinkActive="active">Movies</a>
    
    @if (isAdmin) {
      <a routerLink="/admin" routerLinkActive="active" class="admin-link">
        ⚙️ Admin
      </a>
    }
    
    @if (isLoggedIn) {
      <a routerLink="/booking/my-tickets" routerLinkActive="active">
        My Tickets
      </a>
    }
  </div>

  <div class="navbar-auth">
    
    @if (!isLoggedIn) {
      <a routerLink="/auth/login" class="btn btn-outline">Login</a>
      <a routerLink="/auth/register" class="btn btn-primary">Register</a>
    } @else {
      <div class="user-menu">
        <span class="user-name">👤 {{ currentUser?.fullName }}</span>
        <button class="btn btn-outline" (click)="logout()">Logout</button>
      </div>
    }
    
  </div>
</nav>
